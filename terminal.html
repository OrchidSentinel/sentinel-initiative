<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sentinel Terminal</title>

<style>
body{
    background:black;
    color:#00ff66;
    font-family:Courier New;
    padding:30px;
}

#output{
    white-space:pre-line;
    margin-bottom:20px;
}

input{
    width:100%;
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:12px;
    font-size:18px;
}
</style>
</head>

<body>

<div id="output">
SENTINEL TERMINAL // GSD NODE

COMMANDS:
- recover 77A
- verify sonar
</div>

<input id="command" autofocus placeholder="ENTER COMMAND">

<script>
const input = document.getElementById("command");
const output = document.getElementById("output");

input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        let cmd = input.value.toLowerCase().trim();
        output.innerHTML += "\n\n> " + cmd;

        if(cmd === "recover 77a"){
            output.innerHTML += "\nPARTIAL ACCESS GRANTED.";
            output.innerHTML += "\nSONAR ACCESS CODE: DEPTH-3420";
            output.innerHTML += "\nOPEN: sonar.html";
        }

        else if(cmd === "verify sonar"){
            output.innerHTML += "\nENTER RETURN CODE:";
        }

        else if(cmd === "BLACK-441".toLowerCase()){
            output.innerHTML += "\nSONAR RETURN VERIFIED.";
            output.innerHTML += "\nBLACKBOX ACCESS PASSWORD: REACTOR-77";
            output.innerHTML += "\nOPEN: access-incident.html";
        }

        else{
            output.innerHTML += "\nACCESS DENIED.";
        }

        input.value = "";
    }
});
</script>

</body>
</html>
