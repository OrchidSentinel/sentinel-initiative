<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sentinel Terminal</title>

<style>
body{
    background:black;
    color:#00ff66;
    font-family:Courier New;
    padding:30px;
}
#output{
    white-space:pre-line;
    margin-bottom:20px;
}
input{
    width:100%;
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:12px;
    font-size:18px;
    outline:none;
}
a{ color:red; }
</style>
</head>

<body>

<a href="index.html" style="color:#00ff66;display:inline-block;margin-bottom:22px;text-decoration:none;">&larr; RETURN TO SENTINEL DATABASE</a>

<div id="output">
SENTINEL TERMINAL // GSD NODE

AVAILABLE COMMANDS:
- help
- scan
- clear

--------------------------------

> INCIDENT FILE DETECTED:
SI-GSD-77A-Ω

> NOTE:
The file cannot be recovered directly.

> Hint:
Use the incident designation.
Do not include symbols.
</div>

<input id="command" autofocus placeholder="ENTER COMMAND">

<script>
const input = document.getElementById("command");
const output = document.getElementById("output");

input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        let cmd = input.value.trim().toLowerCase();
        output.innerHTML += "\n\n> " + cmd;

        if(cmd === "recover 77a"){
            output.innerHTML += `
<br><br>PARTIAL ACCESS GRANTED.
<br>SONAR ACCESS CODE: DEPTH-3420
<br><br><a href="sonar.html">OPEN SONAR RECOVERY</a>`;
        }

        else if(cmd === "open 77a"){
            output.innerHTML += `<br><br>DIRECT FILE ACCESS DENIED.<br>RECOVERY PROTOCOL REQUIRED.`;
        }

        else if(cmd === "77a"){
            output.innerHTML += `<br><br>INCOMPLETE COMMAND.`;
        }

        else if(cmd === "help"){
            output.innerHTML += `<br><br>AVAILABLE:<br>- scan<br>- clear<br>- recover [incident]`;
        }

        else if(cmd === "scan"){
            output.innerHTML += `<br><br>ACTIVE INCIDENT FOUND: SI-GSD-77A-Ω`;
        }

        else if(cmd === "clear"){
            output.innerHTML = "SENTINEL TERMINAL // GSD NODE";
        }

        else if(cmd === "black-441"){
            output.innerHTML += `
<br><br>SONAR RETURN VERIFIED.
<br>BLACKBOX ACCESS PASSWORD:
<br><br>REACTOR-77
<br><br><a href="access-incident.html">OPEN BLACKBOX ACCESS</a>`;
        }

        else{
            output.innerHTML += `<br><br>COMMAND NOT RECOGNIZED.`;
        }

        input.value = "";
    }
});
</script>

</body>
</html>
