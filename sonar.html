<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sonar Recovery</title>
<style>
body{
    margin:0;background:black;color:#ff2b2b;
    font-family:'Courier New',monospace;overflow:hidden;
    height:100vh;
}

#login{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:#020202;z-index:5;
    gap:8px;
}
#login h1{letter-spacing:3px;margin-bottom:8px}

input,button{
    background:#000;color:#ff2b2b;
    border:1px solid #8b0000;
    padding:12px;font-family:inherit;margin-top:4px;
    outline:none;
}
input{width:280px;font-size:15px}
input:focus{border-color:#cc0000}
button{cursor:pointer;letter-spacing:1px}
button:hover{background:#1a0000}

#dot{
    width:28px;height:28px;
    background:red;border-radius:50%;
    position:absolute;cursor:pointer;
    box-shadow:0 0 20px red, 0 0 40px rgba(255,0,0,.4);
    display:none;
    transition:box-shadow .15s;
}
#dot:hover{box-shadow:0 0 30px red, 0 0 60px rgba(255,0,0,.6)}

#hud{
    position:fixed;top:16px;left:20px;
    font-size:13px;letter-spacing:2px;color:#ff6666;
    display:none;
}

/* Sonar ping rings */
@keyframes sonar-ring{
    0%{transform:translate(-50%,-50%) scale(.3);opacity:.8}
    100%{transform:translate(-50%,-50%) scale(4);opacity:0}
}
.ring{
    position:absolute;
    width:60px;height:60px;
    border:2px solid rgba(255,0,0,.5);
    border-radius:50%;
    pointer-events:none;
    animation:sonar-ring .6s ease-out forwards;
}

/* Completion banner */
#complete{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.92);
    z-index:10;align-items:center;justify-content:center;
    flex-direction:column;gap:16px;text-align:center;
}
#complete.show{display:flex}
#complete h2{color:#ff2b2b;letter-spacing:4px;font-size:22px}
#complete .code{
    color:#ff2b2b;font-size:26px;letter-spacing:6px;
    border:2px solid #8b0000;padding:12px 28px;
    text-shadow:0 0 18px #ff2b2b;
}
#complete a{
    color:#999;text-decoration:none;
    border:1px solid #444;padding:10px 20px;margin-top:8px;
    font-size:13px;letter-spacing:2px;
}
#complete a:hover{background:#111;color:#ccc}

#error-msg{color:#ff4444;font-size:13px;height:20px}
</style>
</head>
<body>

<div id="login">
    <h1>SONAR ACCESS REQUIRED</h1>
    <p style="color:#777;font-size:13px;letter-spacing:1px">Code aus Sentinel Terminal eingeben.</p>
    <input id="code" placeholder="SONAR ACCESS CODE" type="text" autocomplete="off" spellcheck="false">
    <div id="error-msg"></div>
    <button onclick="unlock()">VERIFY</button>
</div>

<div id="hud">SONAR PINGS RECOVERED: <span id="score">0</span> / 5</div>
<div id="dot"></div>

<div id="complete">
    <h2>SONAR RECOVERY COMPLETE</h2>
    <div class="code">BLACK-441</div>
    <p style="color:#777;font-size:13px">Rückkehrcode für Sentinel Terminal eingeben.</p>
    <a href="terminal.html">← ZURÜCK ZUM TERMINAL</a>
</div>

<script>
const dot   = document.getElementById('dot');
const hud   = document.getElementById('hud');
const scoreEl = document.getElementById('score');
let score   = 0;

function unlock() {
    const code = document.getElementById('code').value.trim().toUpperCase();
    if (code === 'DEPTH-3420') {
        document.getElementById('login').style.display = 'none';
        hud.style.display  = 'block';
        dot.style.display  = 'block';
        moveDot();
    } else {
        const err = document.getElementById('error-msg');
        err.textContent = 'ACCESS DENIED // Code nicht erkannt.';
        setTimeout(function() { err.textContent = ''; }, 2500);
    }
}

document.getElementById('code').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') unlock();
});

function moveDot() {
    dot.style.left = Math.random() * 88 + '%';
    dot.style.top  = Math.random() * 82 + '%';
}

dot.addEventListener('click', function(e) {
    score++;
    scoreEl.textContent = score;

    // Spawn ring at click position
    const ring = document.createElement('div');
    ring.className = 'ring';
    ring.style.left = e.clientX + 'px';
    ring.style.top  = e.clientY + 'px';
    document.body.appendChild(ring);
    setTimeout(function() { ring.remove(); }, 650);

    if (score >= 5) {
        dot.style.display = 'none';
        document.getElementById('complete').classList.add('show');
    } else {
        moveDot();
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        e.preventDefault();
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'sentinel:back' }, '*');
        } else {
            history.back();
        }
    }
});
</script>

</body>
</html>
